name: Update Glossario Hidra
on:
  schedule:
    - cron: '0 11 * * 1' # Segunda 08:00 UTC-3
  workflow_dispatch: # Permite rodar manual

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install deps
        run: npm install @notionhq/client
        
      - name: Build Glossario
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
        run: node scripts/build.js
        
      - name: Commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: jato de dados frescos $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
